<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐱 한자 나라 - 7급 한자 공부</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sky:    #89C4E1;   /* 하늘 파스텔 */
      --mint:   #8ED9C0;   /* 민트 파스텔 */
      --lav:    #B5A8DC;   /* 라벤더 */
      --lavlt:  #D6CFEF;   /* 연한 라벤더 */
      --skylt:  #C8E8F5;   /* 연한 하늘 */
      --mintlt: #C3EDE0;   /* 연한 민트 */
      --bg:     #EFF7FD;   /* 구름빛 배경 */
      --text:   #4A5568;
      --textmd: #718096;
      --white:  #FFFFFF;
    }

    /* ── 구름 느낌 배경 ── */
    body {
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse 300px 180px at 10% 8%,  rgba(255,255,255,.75) 0%, transparent 70%),
        radial-gradient(ellipse 220px 130px at 85% 5%,  rgba(200,232,255,.55) 0%, transparent 70%),
        radial-gradient(ellipse 180px 110px at 55% 15%, rgba(214,207,239,.40) 0%, transparent 70%),
        radial-gradient(ellipse 260px 150px at 30% 90%, rgba(196,237,224,.40) 0%, transparent 70%);
      min-height: 100vh;
      color: var(--text);
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #8ABFE0 0%, #AAD4E8 40%, #C3B5E8 100%);
      color: white;
      padding: 28px 20px 60px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    /* 헤더 아래쪽 구름 물결 */
    .header::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 0; right: 0;
      height: 44px;
      background: var(--bg);
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    }
    /* 헤더 안 장식 구름들 */
    .header::before {
      content: '';
      position: absolute;
      top: 10px; left: -30px;
      width: 160px; height: 70px;
      background: rgba(255,255,255,.18);
      border-radius: 50px;
      box-shadow:
        50px 10px 0 20px rgba(255,255,255,.12),
        120px -5px 0 10px rgba(255,255,255,.10),
        260px 8px 0 25px rgba(255,255,255,.14),
        400px -4px 0 14px rgba(255,255,255,.10),
        550px 12px 0 20px rgba(255,255,255,.12);
    }
    .header h1 { font-size: 2em; margin-bottom: 5px; text-shadow: 0 2px 8px rgba(100,140,200,.3); position: relative; z-index: 1; }
    .header p  { font-size: 1em; opacity: .88; position: relative; z-index: 1; }

    /* ── Nav ── */
    .nav {
      display: flex;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(8px);
      box-shadow: 0 3px 14px rgba(137,196,225,.22);
      overflow-x: auto;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-btn {
      padding: 14px 22px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 1em;
      font-weight: bold;
      color: #b0c4d4;
      white-space: nowrap;
      border-bottom: 3px solid transparent;
      transition: all .25s;
      font-family: inherit;
    }
    .nav-btn.active { color: var(--sky); border-bottom-color: var(--sky); }

    /* ── Content ── */
    .content { max-width: 920px; margin: 0 auto; padding: 26px 16px 40px; }
    .section { display: none; }
    .section.active { display: block; }

    /* ── Grade selector ── */
    .grade-selector { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .grade-btn {
      padding: 9px 24px;
      border-radius: 30px;
      border: 2px solid var(--skylt);
      background: white;
      cursor: pointer;
      font-size: .92em;
      font-weight: bold;
      color: var(--textmd);
      transition: all .25s;
      font-family: inherit;
      box-shadow: 0 2px 8px rgba(137,196,225,.15);
    }
    .grade-btn.active {
      background: linear-gradient(135deg, var(--sky), var(--lav));
      color: white;
      border-color: transparent;
      box-shadow: 0 4px 14px rgba(137,196,225,.38);
    }

    /* ── Section title ── */
    .section-title {
      font-size: 1.25em;
      font-weight: bold;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text);
    }
    .count-badge {
      background: linear-gradient(135deg, var(--sky), var(--lav));
      color: white;
      padding: 3px 12px;
      border-radius: 12px;
      font-size: .66em;
    }

    /* ── Hanja grid ── */
    .hanja-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 11px;
    }
    .hanja-card-mini {
      background: white;
      border-radius: 20px;
      padding: 14px 8px;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(137,196,225,.18);
      border: 2px solid transparent;
      transition: all .28s;
    }
    .hanja-card-mini:hover {
      transform: translateY(-5px) scale(1.03);
      box-shadow: 0 10px 26px rgba(137,196,225,.32);
      border-color: var(--skylt);
      background: linear-gradient(145deg, #fff, #f0f8ff);
    }
    .hanja-char-mini    { font-size: 2.1em; display: block; margin-bottom: 5px; }
    .hanja-reading-mini { font-size: .75em; color: var(--sky); font-weight: bold; }
    .hanja-meaning-mini { font-size: .67em; color: #b0c0cc; margin-top: 2px; }

    /* ── Theme filter ── */
    .theme-filter { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .theme-btn {
      padding: 7px 15px;
      border-radius: 22px;
      border: none;
      background: rgba(255,255,255,.75);
      box-shadow: 0 2px 8px rgba(137,196,225,.15);
      cursor: pointer;
      font-size: .84em;
      font-family: inherit;
      color: var(--textmd);
      transition: all .25s;
    }
    .theme-btn.active {
      background: linear-gradient(135deg, var(--mint), var(--sky));
      color: white;
      box-shadow: 0 3px 10px rgba(142,217,192,.35);
    }

    /* ── Study cards ── */
    .study-card {
      background: white;
      border-radius: 24px;
      padding: 22px 20px;
      margin-bottom: 14px;
      box-shadow: 0 5px 20px rgba(137,196,225,.16);
      display: flex;
      gap: 20px;
      align-items: flex-start;
      transition: all .28s;
      border: 1.5px solid rgba(200,232,255,.6);
    }
    .study-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(137,196,225,.28);
      border-color: var(--skylt);
    }
    .study-char {
      font-size: 3.6em;
      line-height: 1;
      background: linear-gradient(135deg, var(--sky), var(--lav));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      min-width: 88px;
      text-align: center;
      padding-top: 2px;
    }
    .study-info { flex: 1; min-width: 0; }
    .study-reading { font-size: 1.35em; font-weight: bold; color: var(--sky); margin-bottom: 4px; }
    .study-meaning { font-size: 1.05em; color: var(--textmd); margin-bottom: 13px; }
    .study-examples {
      background: linear-gradient(135deg, #f4fbff, #f0f8f5);
      border-radius: 14px;
      padding: 11px 14px;
      border: 1px solid rgba(200,232,255,.5);
    }
    .study-examples-title { font-size: .76em; color: #b0c8d8; margin-bottom: 6px; font-weight: bold; letter-spacing: .04em; }
    .example-item         { font-size: .91em; color: var(--text); padding: 3px 0; line-height: 1.65; }
    .example-word         { font-weight: bold; color: var(--mint); }

    /* ── Modal ── */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(100,140,190,.35);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: white;
      border-radius: 30px;
      padding: 36px 28px 26px;
      max-width: 400px;
      width: 92%;
      text-align: center;
      animation: pop .32s cubic-bezier(.34,1.56,.64,1);
      box-shadow: 0 16px 50px rgba(137,196,225,.35);
      border: 1.5px solid rgba(200,232,255,.6);
    }
    @keyframes pop {
      from { transform: scale(.82) translateY(10px); opacity: 0; }
      to   { transform: scale(1)   translateY(0);    opacity: 1; }
    }
    .modal-char    { font-size: 5.5em; margin: 6px 0;
                     background: linear-gradient(135deg, var(--sky), var(--lav));
                     -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .modal-reading { font-size: 1.6em; font-weight: bold; color: var(--sky); }
    .modal-meaning { font-size: 1.15em; color: var(--textmd); margin: 8px 0 16px; }
    .modal-examples {
      background: linear-gradient(135deg, #f4fbff, #f0f8f5);
      border-radius: 14px;
      padding: 13px;
      text-align: left;
      margin-bottom: 18px;
      border: 1px solid rgba(200,232,255,.5);
    }
    .modal-close {
      background: linear-gradient(135deg, var(--sky), var(--lav));
      color: white;
      border: none;
      border-radius: 25px;
      padding: 11px 30px;
      font-size: 1em;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 4px 14px rgba(137,196,225,.38);
      transition: transform .2s;
    }
    .modal-close:hover { transform: scale(1.05); }

    /* ── Quiz ── */
    .quiz-container { max-width: 580px; margin: 0 auto; }
    .quiz-setup, .quiz-result { text-align: center; padding: 20px 0; }

    .quiz-grade-row {
      display: flex;
      gap: 9px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 13px 0;
    }
    .qg-btn {
      padding: 8px 17px;
      border-radius: 22px;
      border: 2px solid var(--skylt);
      background: white;
      cursor: pointer;
      font-size: .88em;
      font-family: inherit;
      color: var(--textmd);
      transition: all .25s;
      box-shadow: 0 2px 8px rgba(137,196,225,.14);
    }
    .qg-btn.active {
      background: linear-gradient(135deg, var(--sky), var(--lav));
      color: white;
      border-color: transparent;
      box-shadow: 0 4px 12px rgba(137,196,225,.36);
    }

    .quiz-start {
      background: linear-gradient(135deg, var(--sky), var(--lav));
      color: white;
      border: none;
      border-radius: 30px;
      padding: 15px 46px;
      font-size: 1.1em;
      cursor: pointer;
      margin: 24px auto;
      display: inline-block;
      box-shadow: 0 6px 20px rgba(137,196,225,.42);
      font-family: inherit;
      transition: transform .2s, box-shadow .2s;
    }
    .quiz-start:hover { transform: scale(1.06); box-shadow: 0 8px 26px rgba(137,196,225,.52); }

    .progress-bar {
      background: rgba(200,232,255,.4);
      border-radius: 10px;
      height: 10px;
      margin-bottom: 8px;
      overflow: hidden;
    }
    .progress-fill {
      background: linear-gradient(90deg, var(--sky), var(--mint));
      height: 100%;
      border-radius: 10px;
      transition: width .5s ease;
    }
    .score-display { font-size: .87em; color: var(--textmd); margin-bottom: 18px; }

    .quiz-card {
      background: white;
      border-radius: 28px;
      padding: 28px 24px;
      text-align: center;
      box-shadow: 0 6px 26px rgba(137,196,225,.2);
      margin-bottom: 16px;
      border: 1.5px solid rgba(200,232,255,.55);
    }
    .quiz-type-label { font-size: .8em; color: #c0d0dc; margin-bottom: 6px; letter-spacing: .04em; }
    /* 퀴즈 한자 크기 ↓ */
    .quiz-char    { font-size: 3em; line-height: 1.25; margin: 4px 0; white-space: pre-line; color: var(--text); }
    .quiz-prompt  { font-size: 1em; color: var(--textmd); margin-bottom: 20px; }

    .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .quiz-option {
      padding: 13px 10px;
      border: 2px solid rgba(200,232,255,.7);
      border-radius: 16px;
      cursor: pointer;
      font-size: .97em;
      background: white;
      font-family: inherit;
      color: var(--text);
      transition: all .2s;
    }
    .quiz-option:hover:not(:disabled) {
      border-color: var(--skylt);
      background: linear-gradient(145deg, #f0f8ff, #f5f0ff);
    }
    .quiz-option.correct {
      border-color: var(--mint);
      background: linear-gradient(145deg, #eafaf5, #f0fbf7);
      color: #3aaa80;
      font-weight: bold;
    }
    .quiz-option.wrong {
      border-color: #f4b8c4;
      background: #fff0f3;
      color: #e07090;
    }
    /* 한자 찾기 옵션은 살짝만 크게 */
    .quiz-option.char-opt { font-size: 1.45em; padding: 14px; }

    .quiz-feedback { font-size: 1.2em; margin: 14px 0; min-height: 34px; }
    .quiz-next-btn {
      background: linear-gradient(135deg, var(--mint), var(--sky));
      color: white;
      border: none;
      border-radius: 25px;
      padding: 12px 32px;
      font-size: .97em;
      cursor: pointer;
      display: none;
      margin: 6px auto;
      font-family: inherit;
      box-shadow: 0 4px 14px rgba(142,217,192,.38);
      transition: transform .2s;
    }
    .quiz-next-btn:hover { transform: scale(1.05); }

    .result-score { font-size: 2.8em; color: var(--sky); font-weight: bold; margin: 10px 0; }
    .result-stars { font-size: 2.3em; margin: 8px 0; }
    .result-msg   { font-size: 1.2em; color: var(--textmd); margin: 8px 0 18px; }

    /* ── Animations ── */
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    @keyframes shake  { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
    @keyframes float  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    .anim-bounce { animation: bounce .5s ease; }
    .anim-shake  { animation: shake .45s ease; }

    /* ── Responsive ── */
    @media (max-width: 560px) {
      .study-card   { flex-direction: column; align-items: center; text-align: center; }
      .quiz-options { grid-template-columns: 1fr; }
      .hanja-grid   { grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); }
    }

    .empty-msg { text-align: center; color: #c0d0dc; padding: 40px 0; font-size: 1.05em; }

    /* ── 획순 섹션 ── */
    .stroke-section {
      margin: 12px 0 14px;
      text-align: center;
    }
    .stroke-title {
      font-size: .76em;
      color: #b0c8d8;
      font-weight: bold;
      letter-spacing: .05em;
      margin-bottom: 10px;
    }
    /* 획순 가로 스크롤 래퍼 */
    .stroke-row-wrap {
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .stroke-row {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 5px 3px;
      justify-content: center;
      align-items: flex-end;
      padding: 4px 2px;
    }
    /* 획 하나씩 묶음 */
    .stroke-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }
    .stroke-step svg {
      display: block;
      border-radius: 10px;
      background: linear-gradient(135deg, #f2f9ff, #f6f2ff);
      box-shadow: 0 2px 8px rgba(137,196,225,.18);
    }
    .stroke-step-label {
      font-size: .62em;
      color: #b8ceda;
      line-height: 1;
    }
    /* 획 사이 화살표 */
    .stroke-arrow {
      color: #c8dce8;
      font-size: 1em;
      display: flex;
      align-items: center;
      padding-bottom: 16px; /* SVG와 세로 중앙 맞춤 */
      flex-shrink: 0;
    }
    /* 에러/로딩 메시지 */
    .stroke-msg {
      color: #c0d8e8;
      font-size: .82em;
      padding: 16px 0;
    }
    /* 획순 구분선 */
    .modal-divider {
      border: none;
      border-top: 1.5px solid rgba(200,232,255,.5);
      margin: 4px 0 14px;
    }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<div class="header">
  <h1>🐱 한자 나라</h1>
  <p>8급 · 7급 한자 즐겁게 공부해요!</p>
</div>

<!-- ── NAV ── -->
<nav class="nav">
  <button class="nav-btn active" data-sec="list"  onclick="showSection('list',this)">📋 한자 목록</button>
  <button class="nav-btn"        data-sec="study" onclick="showSection('study',this)">📖 주제별 학습</button>
  <button class="nav-btn"        data-sec="quiz"  onclick="showSection('quiz',this)">🎯 퀴즈</button>
</nav>

<div class="content">

  <!-- ══════════════ LIST ══════════════ -->
  <div class="section active" id="section-list">
    <div class="grade-selector">
      <button class="grade-btn active" onclick="switchListGrade(0,this)">☁️ 전체</button>
      <button class="grade-btn"        onclick="switchListGrade(8,this)">🌤️ 8급</button>
      <button class="grade-btn"        onclick="switchListGrade(7,this)">🫧 7급</button>
    </div>
    <div class="section-title">
      한자 전체 보기
      <span class="count-badge" id="list-count">123자</span>
    </div>
    <div class="hanja-grid" id="hanja-grid"></div>
  </div>

  <!-- ══════════════ STUDY ══════════════ -->
  <div class="section" id="section-study">
    <div class="grade-selector">
      <button class="grade-btn active" onclick="switchStudyGrade(0,this)">☁️ 전체</button>
      <button class="grade-btn"        onclick="switchStudyGrade(8,this)">🌤️ 8급</button>
      <button class="grade-btn"        onclick="switchStudyGrade(7,this)">🫧 7급</button>
    </div>
    <div class="theme-filter" id="theme-filter"></div>
    <div id="study-cards"></div>
  </div>

  <!-- ══════════════ QUIZ ══════════════ -->
  <div class="section" id="section-quiz">
    <div class="quiz-container">

      <!-- Setup -->
      <div id="quiz-setup">
        <div style="font-size:3.8em">🎯</div>
        <h2 style="margin:14px 0 6px">퀴즈 풀기</h2>
        <p style="color:#999;font-size:.95em">어떤 한자를 공부할까요?</p>

        <p style="margin:20px 0 6px;font-weight:bold;color:#555">📚 급수 선택</p>
        <div class="quiz-grade-row" id="qg-grade-row">
          <button class="qg-btn active" onclick="pickGrade(8,this)">🌤️ 8급</button>
          <button class="qg-btn"        onclick="pickGrade(7,this)">🫧 7급 추가</button>
          <button class="qg-btn"        onclick="pickGrade(0,this)">☁️ 전체 다</button>
        </div>

        <p style="margin:16px 0 6px;font-weight:bold;color:#555">🎮 퀴즈 유형</p>
        <div class="quiz-grade-row" id="qg-type-row">
          <button class="qg-btn active" onclick="pickType('reading',this)">🔤 음 맞추기</button>
          <button class="qg-btn"        onclick="pickType('meaning',this)">💡 뜻 맞추기</button>
          <button class="qg-btn"        onclick="pickType('char',this)">🀄 한자 찾기</button>
          <button class="qg-btn"        onclick="pickType('mixed',this)">🎲 랜덤 섞기</button>
        </div>

        <button class="quiz-start" onclick="startQuiz()">퀴즈 시작! 🚀</button>
      </div>

      <!-- Quiz area -->
      <div id="quiz-area" style="display:none">
        <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
        <div class="score-display">
          <span id="q-num">1</span> / <span id="q-total">10</span> 번째 문제 &nbsp;|&nbsp; ⭐ <span id="q-score">0</span>점
        </div>

        <div class="quiz-card">
          <div class="quiz-type-label" id="q-type-label"></div>
          <div class="quiz-char"       id="q-char"></div>
          <div class="quiz-prompt"     id="q-prompt"></div>
          <div class="quiz-options"    id="q-options"></div>
          <div class="quiz-feedback"   id="q-feedback"></div>
          <button class="quiz-next-btn" id="q-next" onclick="nextQ()">다음 문제 →</button>
        </div>
      </div>

      <!-- Result -->
      <div id="quiz-result" style="display:none">
        <div style="font-size:4em">🎉</div>
        <div class="result-score" id="res-score"></div>
        <div class="result-stars" id="res-stars"></div>
        <div class="result-msg"   id="res-msg"></div>
        <button class="quiz-start" onclick="resetQuiz()">다시 도전!</button>
      </div>

    </div>
  </div>

</div><!-- content -->

<!-- ── MODAL ── -->
<div class="modal" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-content">
    <div class="modal-char"    id="m-char"></div>
    <div class="modal-reading" id="m-reading"></div>

  {char:'入',rd:'입',mn:'들 입',  si:'들어가다',              th:'상태', ex:[{w:'入口',r:'입구',m:'들어가는 곳'},{w:'入學',r:'입학',m:'학교에 들어감'}]},
];

/* ============================================================
   STATE
   ============================================================ */
let listGrade  = 0;   // 0 = 전체, 8 = 8급, 7 = 7급
let studyGrade = 0;
let studyTheme = '전체';

let qGrade  = 8;
let qType   = 'reading';
let questions   = [];
let qIdx        = 0;
let qScore      = 0;
let qOpts       = [];  // current question's options array

/* ============================================================
   HELPERS
   ============================================================ */
const themeEmoji = {숫자:'🔢',자연:'🌿',가족:'👨‍👩‍👧',방향:'🧭',학습:'📚',사회:'🏘️',계절:'🍂',신체:'💪',색깔:'🎨',생활:'🏠',크기:'📏',덕목:'⭐',상태:'🔄'};

function getData(grade) {
  if (grade === 0) return [...G8, ...G7];
  return grade === 8 ? G8 : G7;
}

/* 전체 데이터 중에서 한자 찾기 */
function findChar(char) {
  return [...G8, ...G7].find(x => x.char === char);
}

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

/* ============================================================
   NAV
   ============================================================ */
function showSection(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('section-' + id).classList.add('active');
  btn.classList.add('active');
  if (id === 'list')  renderList();
  if (id === 'study') renderStudy();
}

/* ============================================================
   LIST
   ============================================================ */
function switchListGrade(g, btn) {
  listGrade = g;
  btn.parentElement.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList() {
  const data = getData(listGrade);
  document.getElementById('list-count').textContent = data.length + '자';
  document.getElementById('hanja-grid').innerHTML = data.map(h =>
    `<div class="hanja-card-mini" onclick="openModal('${h.char}')">
       <span class="hanja-char-mini">${h.char}</span>
       <div class="hanja-reading-mini">${h.rd}</div>
       <div class="hanja-meaning-mini">${h.mn}</div>
     </div>`
  ).join('');
}

/* ============================================================
   MODAL + 획순 (정적 SVG 단계별 표시)
   ============================================================ */

function openModal(char) {
  const h = findChar(char);
  if (!h) return;

  document.getElementById('m-char').textContent    = h.char;
  document.getElementById('m-reading').textContent = `${h.rd}  (${h.mn})`;
  document.getElementById('m-meaning').textContent = '✏️ ' + h.si;
  document.getElementById('m-examples').innerHTML  =
    `<div class="study-examples-title">📚 이 한자가 들어간 단어</div>` +
    h.ex.map(e =>
      `<div class="example-item"><span class="example-word">${e.w}(${e.r})</span> : ${e.m}</div>`
    ).join('');

  document.getElementById('stroke-target').innerHTML = '';
  renderStrokeProgression(h.char);

  document.getElementById('modal').classList.add('active');
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

/* ── 획순 단계별 SVG 렌더링 ── */
function renderStrokeProgression(char) {
  const target = document.getElementById('stroke-target');

  // hanzi-writer-data CDN에서 획 경로 데이터 로드
  const url = `https://cdn.jsdelivr.net/npm/hanzi-writer-data@latest/${encodeURIComponent(char)}.json`;

  fetch(url)
    .then(r => {
      if (!r.ok) throw new Error('no data');
      return r.json();
    })
    .then(data => {
      const strokes = data.strokes;  // SVG path 문자열 배열
      const n = strokes.length;

      /* SVG 크기 및 좌표계 설정
         hanzi-writer-data 좌표: 0~1024, Y축 위 방향 → SVG 변환 필요 */
      const S   = 46;   // SVG 픽셀 크기 (작게)
      const PAD = 60;   // 한자가 꽉 차지 않도록 뷰박스 여백
      const vb  = `${-PAD} ${-PAD} ${1024 + PAD*2} ${1024 + PAD*2}`;
      const tf  = 'translate(0,1024) scale(1,-1)';

      /* 색상 팔레트 */
      const COL_DONE    = '#8ABDE0';              // 이전 획 — 하늘 파스텔
      const COL_CURRENT = '#FF5A7E';              // 현재 획 — 비비드 핑크 (눈에 띄는 색)
      const COL_FUTURE  = 'rgba(180,210,230,.15)'; // 아직 안 쓴 획 — 거의 투명

      const steps = strokes.map((_, i) => {
        const paths = strokes.map((d, j) => {
          const fill = j < i ? COL_DONE : j === i ? COL_CURRENT : COL_FUTURE;
          return `<path d="${d}" fill="${fill}"/>`;
        }).join('');

        return `
          <div class="stroke-step">
            <svg width="${S}" height="${S}" viewBox="${vb}" xmlns="http://www.w3.org/2000/svg">
              <g transform="${tf}">${paths}</g>
            </svg>
            <div class="stroke-step-label">${i+1}획</div>
          </div>
          ${i < n - 1 ? '<div class="stroke-arrow">›</div>' : ''}
        `;
      }).join('');

      target.innerHTML = `<div class="stroke-row">${steps}</div>`;
    })
    .catch(() => {
      target.innerHTML = `<div class="stroke-msg">획순 정보를 불러올 수 없어요 😅<br><span style="font-size:.8em">인터넷 연결을 확인해 주세요</span></div>`;
    });
}

/* ============================================================
   STUDY
   ============================================================ */
function switchStudyGrade(g, btn) {
  studyGrade = g;
  studyTheme = '전체';
  btn.parentElement.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderStudy();
}

function selectTheme(t) { studyTheme = t; renderStudy(); }

function renderStudy() {
  const data = getData(studyGrade);
  const themes = ['전체', ...new Set(data.map(h => h.th))];

  document.getElementById('theme-filter').innerHTML = themes.map(t =>
    `<button class="theme-btn ${t === studyTheme ? 'active' : ''}" onclick="selectTheme('${t}')">
       ${themeEmoji[t] || '📌'} ${t}
     </button>`
  ).join('');

  const filtered = studyTheme === '전체' ? data : data.filter(h => h.th === studyTheme);

  document.getElementById('study-cards').innerHTML = filtered.length
    ? filtered.map(h =>
        `<div class="study-card">
           <div class="study-char">${h.char}</div>
           <div class="study-info">
             <div class="study-reading">${h.rd} &nbsp;(${h.mn})</div>
             <div class="study-meaning">💡 ${h.si}</div>
             <div class="study-examples">
               <div class="study-examples-title">📚 이 한자가 들어간 단어</div>
               ${h.ex.map(e => `<div class="example-item"><span class="example-word">${e.w}(${e.r})</span> : ${e.m}</div>`).join('')}
             </div>
           </div>
         </div>`
      ).join('')
    : `<div class="empty-msg">해당 주제의 한자가 없어요 😅</div>`;
}

/* ============================================================
   QUIZ
   ============================================================ */
function pickGrade(g, btn) {
  qGrade = g;
  btn.parentElement.querySelectorAll('.qg-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
function pickType(t, btn) {
  qType = t;
  btn.parentElement.querySelectorAll('.qg-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function buildQuestions(n = 10) {
  const pool = qGrade === 0 ? [...G8, ...G7] : getData(qGrade);
  const all  = shuffle(pool);
  const sel  = all.slice(0, Math.min(n, all.length));

  return sel.map(h => {
    let type = qType === 'mixed'
      ? ['reading','meaning','char'][Math.floor(Math.random()*3)]
      : qType;

    const others = shuffle(pool.filter(x => x.char !== h.char));

    if (type === 'reading') {
      const opts = shuffle([h.rd, ...others.slice(0,3).map(x => x.rd)]);
      return { display: h.char, label: '이 한자의 음(읽는 법)은?', prompt: '어떻게 읽을까요?', answer: h.rd, opts, isChar: false };
    }
    if (type === 'meaning') {
      const opts = shuffle([h.si, ...others.slice(0,3).map(x => x.si)]);
      return { display: h.char, label: `이 한자(${h.rd})의 뜻은?`, prompt: '뜻이 무엇일까요?', answer: h.si, opts, isChar: false };
    }
    // char
    const opts = shuffle([h.char, ...others.slice(0,3).map(x => x.char)]);
    return { display: `${h.rd}\n${h.si}`, label: '한자를 찾아보세요!', prompt: '이 뜻을 가진 한자는 어느 것일까요?', answer: h.char, opts, isChar: true };
  });
}

function startQuiz() {
  questions = buildQuestions(10);
  qIdx = 0; qScore = 0;
  document.getElementById('quiz-setup').style.display  = 'none';
  document.getElementById('quiz-result').style.display = 'none';
  document.getElementById('quiz-area').style.display   = 'block';
  document.getElementById('q-total').textContent = questions.length;
  renderQ();
}

function renderQ() {
  const q = questions[qIdx];
  const pct = (qIdx / questions.length) * 100;
  document.getElementById('prog-fill').style.width   = pct + '%';
  document.getElementById('q-num').textContent       = qIdx + 1;
  document.getElementById('q-score').textContent     = qScore;
  document.getElementById('q-type-label').textContent = q.label;
  document.getElementById('q-char').textContent      = q.display;
  document.getElementById('q-prompt').textContent    = q.prompt;
  document.getElementById('q-feedback').textContent  = '';
  document.getElementById('q-next').style.display    = 'none';

  qOpts = q.opts;
  document.getElementById('q-options').innerHTML = q.opts.map((opt, i) =>
    `<button class="quiz-option ${q.isChar ? 'char-opt' : ''}"
             onclick="checkAns(${i})">${opt}</button>`
  ).join('');
}

function checkAns(idx) {
  const q   = questions[qIdx];
  const sel = qOpts[idx];
  document.querySelectorAll('.quiz-option').forEach(b => b.disabled = true);
  const btns = document.querySelectorAll('.quiz-option');

  if (sel === q.answer) {
    btns[idx].classList.add('correct', 'anim-bounce');
    document.getElementById('q-feedback').textContent = '🎉 정답이에요! 멋져요!';
    qScore += 10;
    document.getElementById('q-score').textContent = qScore;
  } else {
    btns[idx].classList.add('wrong', 'anim-shake');
    document.getElementById('q-feedback').textContent = `😅 아쉬워요! 정답은 "${q.answer}"`;
    btns.forEach(b => { if (b.textContent.trim() === q.answer) b.classList.add('correct'); });
  }
  document.getElementById('q-next').style.display = 'block';
}

function nextQ() {
  qIdx++;
  if (qIdx >= questions.length) showResult();
  else renderQ();
}

function showResult() {
  document.getElementById('quiz-area').style.display   = 'none';
  document.getElementById('quiz-result').style.display = 'block';

  const max = questions.length * 10;
  const pct = (qScore / max) * 100;

  document.getElementById('res-score').textContent = `${qScore}점 / ${max}점`;

  let stars, msg;
  if      (pct >= 90) { stars = '⭐⭐⭐'; msg = '완벽해요! 진짜 대단해요! 🏆'; }
  else if (pct >= 70) { stars = '⭐⭐';   msg = '잘했어요! 조금만 더 공부해봐요! 💪'; }
  else if (pct >= 50) { stars = '⭐';     msg = '열심히 공부하면 더 잘할 수 있어요! 📚'; }
  else                { stars = '🌱';     msg = '다시 한 번 도전해봐요! 할 수 있어요! 🎯'; }

  document.getElementById('res-stars').textContent = stars;
  document.getElementById('res-msg').textContent   = msg;
}

function resetQuiz() {
  document.getElementById('quiz-result').style.display = 'none';
  document.getElementById('quiz-setup').style.display  = 'block';
}

/* ── Init ── */
renderList();
renderStudy();
</script>
</body>
</html>
